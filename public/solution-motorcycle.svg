<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" rx="12" fill="#F0FDF4"/>
  <!-- Motorcycle simplified -->
  <circle cx="22" cy="52" r="12" fill="none" stroke="#0F172A" stroke-width="3"/>
  <circle cx="22" cy="52" r="4" fill="#0F172A"/>
  <circle cx="58" cy="52" r="12" fill="none" stroke="#0F172A" stroke-width="3"/>
  <circle cx="58" cy="52" r="4" fill="#0F172A"/>
